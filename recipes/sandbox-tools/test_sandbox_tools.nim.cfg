# The sandbox-tools recipe tests import the autotools convention module
# (``repro_standard_provider/conventions/c_cpp_autotools``) to assert Mode B
# recognition. That module references ``buildPackageFragment``, which the
# project DSL only defines ``when defined(reproProviderMode)`` — the same define
# the reprobuild engine sets when it compiles a recipe's provider interface.
# Setting it here lets the fast fixture test compile + run standalone via
#   nim c -r recipes/sandbox-tools/test_sandbox_tools.nim
# (the repo-root config.nims supplies every ``libs/*/src`` path).
--define:reproProviderMode
--hints:off
