name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Run linters
        run: nix develop --command just lint
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs
          path: test-logs/
          retention-days: 30

  test:
    name: Test
    # Self-hosted bare-metal Linux runner. Standard ubuntu-latest hits
    # OOM on the 8-parallel `nim c` default and the fd race in the M3
    # fallback test runner because the 4 vCPU / 16 GB shape is the
    # bottleneck. Our metacraft-labs bare-metal pool has ~12 Linux
    # nixos hosts with plenty of cores + RAM; lift the parallelism
    # caps via env vars below for runs that land there.
    runs-on: [self-hosted, Linux, X64, bare-metal, nixos]
    env:
      # Cap engine action parallelism. nproc/2 on a bare-metal host
      # with 32+ cores and 64+ GB RAM still leaves headroom; the cap
      # exists only because scripts/run_tests.sh would otherwise cap
      # at 4 for GitHub-hosted-runner safety. Override with a generous
      # value here so the suite finishes fast.
      REPROBUILD_MAX_PARALLELISM: "16"
      # M3 fallback test runner's pipe pumper crashes at 4 threads on
      # GitHub-hosted runners (fd race). Bare-metal hosts have the
      # process headroom to tolerate higher concurrency, but cap at 4
      # until the underlying race is fixed in the runner.
      REPROBUILD_TEST_THREADS: "4"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: nix develop --command just test
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-logs/
          retention-days: 30

  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Build default package
        run: nix build .#default
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: test-logs/
          retention-days: 30
