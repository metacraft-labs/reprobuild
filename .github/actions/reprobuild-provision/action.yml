name: Reprobuild dependency provisioning
description: >
  Provision the sibling repositories the `repro` CLI build depends on, cloning
  them adjacent to the host checkout (under $GITHUB_WORKSPACE) so the reprobuild
  flake inputs / env.ps1 source-only Nim deps resolve to local paths.

  This is the "dependency provisioning" half of the reprobuild dev-env flavor;
  the companion `setup-reprobuild` action clones the reprobuild source and builds
  the CLI. Reprobuild's workspace/provisioning model is being aligned to the
  repo-workspaces manifest+lock+sibling contract (repo-workspaces is the pilot);
  until that lands, these dependency pins are inlined here.

inputs:
  gh-token:
    description: GitHub token (CI App token) for cloning private metacraft-labs repos.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Clone reprobuild flake-input siblings (Linux/macOS)
      # Reprobuild's flake.nix references private metacraft-labs repos
      # (codetracer-native-recorder, runquota) as flake inputs. The default
      # repo-scoped token can't read sibling private repos via the tarball URL,
      # so clone them adjacent and override the flake inputs to local paths.
      if: ${{ runner.os != 'Windows' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        WS="${GITHUB_WORKSPACE}"
        for entry in \
          "codetracer-native-recorder:stable" \
          "runquota:main" \
        ; do
          name="${entry%%:*}"
          ref="${entry##*:}"
          dest="${WS}/${name}"
          rm -rf "${dest}"
          git clone --depth 1 --branch "${ref}" --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/metacraft-labs/${name}.git" \
            "${dest}"
        done

    - name: Clone reprobuild env.ps1 sibling deps (Windows)
      # The Windows reprobuild env.ps1 dot-sources ../repo-workspaces/env.ps1
      # (toolchain bootstrap) and reads sibling repos for source-only Nim deps:
      #   repo-workspaces, codetracer (nim-* submodules), runquota,
      #   nim-stackable-hooks, and status-im/nim-bearssl.
      # These must be siblings of the reprobuild checkout, i.e. under
      # $GITHUB_WORKSPACE.
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        WS="${GITHUB_WORKSPACE}"
        clone_repo() {
          local name="$1"
          local ref="$2"
          local dest="${WS}/${name}"
          local submodule_flags="${3:-}"

          rm -rf "${dest}"
          if ! git clone --depth 1 --branch "${ref}" --single-branch ${submodule_flags} \
            "https://x-access-token:${GH_TOKEN}@github.com/metacraft-labs/${name}.git" \
            "${dest}"; then
            rm -rf "${dest}"
            git clone --depth 1 ${submodule_flags} \
              "https://x-access-token:${GH_TOKEN}@github.com/metacraft-labs/${name}.git" \
              "${dest}"
          fi
        }

        for entry in \
          "repo-workspaces:main" \
          "runquota:main" \
          "nim-stackable-hooks:main" \
        ; do
          name="${entry%%:*}"
          ref="${entry##*:}"
          clone_repo "${name}" "${ref}" "--recurse-submodules"
        done

        clone_repo "codetracer" "main"
        git -C "${WS}/codetracer" config \
          url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
          "https://github.com/"
        git -C "${WS}/codetracer" submodule update --init --depth 1 --recursive -- \
          libs/nim-serialization \
          libs/nim-faststreams \
          libs/nim-stew \
          libs/nimcrypto

        # Reprobuild's peer-cache apps import status-im/nim-bearssl. The Nix
        # dev shell supplies this through BEARSSL_SRC; Windows env.ps1 resolves
        # the same source as a sibling checkout.
        bearssl_ref="9a4eed052abbded2d94feaf3f5bbd95a30ec4671"
        bearssl_dest="${WS}/nim-bearssl"
        rm -rf "${bearssl_dest}"
        git clone --depth 1 --recurse-submodules \
          "https://github.com/status-im/nim-bearssl.git" \
          "${bearssl_dest}"
        git -C "${bearssl_dest}" fetch --depth 1 origin "${bearssl_ref}"
        git -C "${bearssl_dest}" checkout --detach FETCH_HEAD
        git -C "${bearssl_dest}" submodule update --init --recursive --depth 1
