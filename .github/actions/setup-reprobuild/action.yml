name: Setup Reprobuild
description: >-
  Provision the reprobuild build engine (the `repro` CLI and its sibling
  tools) on a GitHub Actions runner. Prefers downloading the matching
  release artifact and falls back to a build-from-source path that drives
  `just build` from this repository.
author: Metacraft Labs

# This composite action lives inside the reprobuild repository so the
# `dogfood` CI job can exercise it against the current branch. When the
# packaging story in docs/PACKAGING.md ships, the action moves to its own
# repository (`metacraft-labs/setup-reprobuild`) and this copy becomes a
# thin shim that re-uses it.

branding:
  icon: package
  color: blue

inputs:
  version:
    description: >-
      Reprobuild version to install (e.g. `v1.4.0`). Use `latest` to resolve
      the most recent GitHub release, or `source` to force the
      build-from-source fallback regardless of whether a matching binary
      release exists.
    required: false
    default: latest
  os:
    description: >-
      Target operating system. Defaults to auto-detection via `runner.os`.
      Accepted: `Linux`, `macOS`, `Windows`.
    required: false
    default: ""
  tool-provisioning:
    description: >-
      Channel to use when fetching binary artifacts: `tarball` (default)
      pulls the portable archive from the GitHub release; `installer`
      reserves the slot for the native MSI / pkg / deb / rpm channel once
      it ships.
    required: false
    default: tarball
  cache:
    description: >-
      Cache the resolved binaries (and, in the source fallback, the
      `build/bin` + `build/lib` outputs) between runs.
    required: false
    default: "true"
  repo-root:
    description: >-
      Path to a reprobuild source checkout used by the build-from-source
      fallback. Defaults to the repository that invoked the workflow
      (`github.workspace`), which is correct for the in-repo `dogfood`
      job. Downstream callers point this at a sibling checkout.
    required: false
    default: ""
  github-token:
    description: >-
      Token used to query the GitHub Releases API and to download release
      assets from private repositories. Defaults to the workflow's
      `github.token`.
    required: false
    default: ${{ github.token }}

outputs:
  repro-bin:
    description: Absolute path to the directory containing `repro` (and siblings).
    value: ${{ steps.expose.outputs.repro-bin }}
  repro-version:
    description: Fully resolved reprobuild version (e.g. `v1.4.0` or `source@<sha>`).
    value: ${{ steps.expose.outputs.repro-version }}
  cache-hit:
    description: >-
      `true` when the binaries were restored from the actions cache,
      `false` otherwise.
    value: ${{ steps.expose.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Resolve inputs
      id: resolve
      shell: bash
      run: |
        set -euo pipefail
        os="${{ inputs.os }}"
        if [ -z "${os}" ]; then
          case "${{ runner.os }}" in
            Linux)   os=Linux ;;
            macOS)   os=macOS ;;
            Windows) os=Windows ;;
            *)
              echo "::error::unsupported runner.os: ${{ runner.os }}" >&2
              exit 2 ;;
          esac
        fi
        echo "os=${os}" >>"$GITHUB_OUTPUT"

        repo_root="${{ inputs.repo-root }}"
        if [ -z "${repo_root}" ]; then
          repo_root="${{ github.workspace }}"
        fi
        echo "repo-root=${repo_root}" >>"$GITHUB_OUTPUT"

        version="${{ inputs.version }}"
        if [ "${version}" = "latest" ]; then
          # `gh release view --json tagName` is the preferred path —
          # it transparently handles GHE hosts and uses the same auth
          # mechanism as the rest of the workflow. We fall back to the
          # raw REST API when `gh` is unavailable (e.g. self-hosted
          # runners without the GitHub CLI preinstalled). If both paths
          # return nothing, we fall back to a source build — the
          # current state on `dev` before the first release ships.
          resolved=""
          if command -v gh >/dev/null 2>&1; then
            resolved="$(GH_TOKEN="${{ inputs.github-token }}" \
              gh release view --repo metacraft-labs/reprobuild \
                --json tagName --jq '.tagName' 2>/dev/null || true)"
          fi
          if [ -z "${resolved}" ]; then
            resolved="$(curl -fsSL \
              -H "Authorization: Bearer ${{ inputs.github-token }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/metacraft-labs/reprobuild/releases/latest \
              2>/dev/null | jq -r '.tag_name // ""' || true)"
          fi
          if [ -z "${resolved}" ] || [ "${resolved}" = "null" ]; then
            echo "::warning::no published release found; falling back to source build"
            version=source
          else
            version="${resolved}"
          fi
        fi
        echo "version=${version}" >>"$GITHUB_OUTPUT"

        # Layout under RUNNER_TOOL_CACHE keeps the install isolated per
        # version and platform so multiple workflows on the same runner do
        # not clobber each other.
        install_dir="${RUNNER_TOOL_CACHE:-${HOME}/.cache}/reprobuild/${version}/${os}"
        echo "install-dir=${install_dir}" >>"$GITHUB_OUTPUT"

    - name: Restore reprobuild cache
      id: cache
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: ${{ steps.resolve.outputs.install-dir }}
        key: reprobuild-${{ steps.resolve.outputs.os }}-${{ steps.resolve.outputs.version }}-v1

    - name: Download release tarball
      id: download
      if: >-
        steps.resolve.outputs.version != 'source'
        && steps.cache.outputs.cache-hit != 'true'
        && inputs.tool-provisioning == 'tarball'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        # Triples + archive extensions match
        # .github/workflows/release.yml + scripts/package-release.sh.
        # When the matching asset is missing (e.g. an aarch64-linux-gnu
        # runner asking for a release that only published x86_64), we
        # mark the version as `source` so the next step rebuilds from
        # the in-tree checkout. The fallback chain is:
        #     1. release tarball (this step)
        #     2. source build (the step after this one)
        version="${{ steps.resolve.outputs.version }}"
        os="${{ steps.resolve.outputs.os }}"
        install_dir="${{ steps.resolve.outputs.install-dir }}"
        mkdir -p "${install_dir}"
        case "${os}" in
          Linux)
            case "$(uname -m)" in
              aarch64|arm64) triple="aarch64-unknown-linux-gnu" ;;
              *)             triple="x86_64-unknown-linux-gnu" ;;
            esac
            ext="tar.gz" ;;
          macOS)
            if [ "$(uname -m)" = "arm64" ]; then triple="aarch64-apple-darwin"
            else triple="x86_64-apple-darwin"; fi
            ext="tar.gz" ;;
          Windows)
            triple="x86_64-pc-windows-msvc"
            ext="zip" ;;
        esac
        # Strip a leading `v` from the version when forming the archive
        # base name (release.yml encodes versions without the prefix).
        ver_bare="${version#v}"
        stage="reprobuild-${ver_bare}-${triple}"
        asset="${stage}.${ext}"
        url="https://github.com/metacraft-labs/reprobuild/releases/download/${version}/${asset}"
        echo "fetching ${url}"
        tmp="$(mktemp -d)"
        http_status="$(curl -sSL -o "${tmp}/${asset}" -w '%{http_code}' \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/octet-stream" \
          "${url}" || echo "000")"
        if [ "${http_status}" != "200" ]; then
          echo "::warning::release asset ${asset} not found at ${url} (HTTP ${http_status}); falling back to source build"
          # The fall-back signal is consumed by the next step's `if:`.
          # We deliberately do NOT mutate the resolved version here —
          # that would corrupt the cache key. The exposed `repro-version`
          # output is recomputed in the `expose` step to read
          # `source@<sha>` when this flag is set.
          echo "fell-back-to-source=true" >>"$GITHUB_OUTPUT"
          exit 0
        fi
        # Optional checksum verification when the publisher uploaded a
        # `.sha256` sidecar (release.yml does — see PART B).
        sha_url="${url}.sha256"
        if curl -fsSL -o "${tmp}/${asset}.sha256" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "${sha_url}" 2>/dev/null; then
          ( cd "${tmp}" && \
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c "${asset}.sha256"
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -c "${asset}.sha256"
            fi
          )
        fi
        case "${ext}" in
          tar.gz)
            # Archives published by package-release.sh wrap a
            # `reprobuild-<ver>-<triple>/` directory; strip one path
            # component so `bin/` / `lib/` land directly under
            # ${install_dir}.
            tar -xzf "${tmp}/${asset}" -C "${install_dir}" --strip-components=1
            ;;
          zip)
            unzip_tmp="$(mktemp -d)"
            if command -v unzip >/dev/null 2>&1; then
              unzip -q "${tmp}/${asset}" -d "${unzip_tmp}"
            else
              # Windows runners have BSD `tar` which speaks zip.
              tar -xf "${tmp}/${asset}" -C "${unzip_tmp}"
            fi
            # Flatten the single top-level `reprobuild-<ver>-<triple>/`
            # directory the same way the tarball path does.
            top_dir="$(ls -1 "${unzip_tmp}" | head -n1)"
            cp -R "${unzip_tmp}/${top_dir}/." "${install_dir}/"
            ;;
        esac
        echo "fell-back-to-source=false" >>"$GITHUB_OUTPUT"

    - name: Build from source (fallback)
      id: source-build
      # Three trigger paths:
      #   1. User explicitly asked for `version: source`.
      #   2. `version: latest` resolved to empty (no release published yet).
      #   3. The release exists but lacks the matching per-triple asset
      #      (the download step exits cleanly with fell-back-to-source=true).
      if: >-
        (steps.resolve.outputs.version == 'source'
          || steps.download.outputs.fell-back-to-source == 'true')
        && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        repo_root="${{ steps.resolve.outputs.repo-root }}"
        install_dir="${{ steps.resolve.outputs.install-dir }}"
        if [ ! -f "${repo_root}/scripts/build_apps.sh" ]; then
          echo "::error::no reprobuild source at ${repo_root} (missing scripts/build_apps.sh)" >&2
          exit 2
        fi
        echo "building reprobuild from source at ${repo_root}"
        ( cd "${repo_root}" && bash ./scripts/build_apps.sh )
        mkdir -p "${install_dir}/bin" "${install_dir}/lib"
        cp -R "${repo_root}/build/bin/." "${install_dir}/bin/"
        # `build/lib` is missing on platforms where no shared lib is produced
        # (e.g. unusual cross-builds); only copy when present.
        if [ -d "${repo_root}/build/lib" ]; then
          cp -R "${repo_root}/build/lib/." "${install_dir}/lib/"
        fi

    - name: Expose binaries on PATH
      id: expose
      shell: bash
      run: |
        set -euo pipefail
        install_dir="${{ steps.resolve.outputs.install-dir }}"
        bin_dir="${install_dir}/bin"
        if [ ! -d "${bin_dir}" ]; then
          echo "::error::reprobuild install dir is empty: ${bin_dir}" >&2
          exit 2
        fi
        echo "${bin_dir}" >>"$GITHUB_PATH"
        # macOS / Linux: surface the shared-lib dir to the dynamic loader
        # for the duration of the workflow.
        case "${{ steps.resolve.outputs.os }}" in
          Linux)
            echo "LD_LIBRARY_PATH=${install_dir}/lib:${LD_LIBRARY_PATH:-}" >>"$GITHUB_ENV" ;;
          macOS)
            echo "DYLD_LIBRARY_PATH=${install_dir}/lib:${DYLD_LIBRARY_PATH:-}" >>"$GITHUB_ENV" ;;
        esac
        echo "REPROBUILD_HOME=${install_dir}" >>"$GITHUB_ENV"
        echo "repro-bin=${bin_dir}" >>"$GITHUB_OUTPUT"
        # `repro-version` mirrors the actually-realised binary: source
        # for explicit fallback + on missing-asset fallback (the
        # download step's `fell-back-to-source` flag), or the upstream
        # release tag otherwise.
        if [ "${{ steps.resolve.outputs.version }}" = "source" ] \
            || [ "${{ steps.download.outputs.fell-back-to-source }}" = "true" ]; then
          resolved="source@${{ github.sha }}"
        else
          resolved="${{ steps.resolve.outputs.version }}"
        fi
        echo "repro-version=${resolved}" >>"$GITHUB_OUTPUT"
        echo "cache-hit=${{ steps.cache.outputs.cache-hit == 'true' }}" >>"$GITHUB_OUTPUT"
